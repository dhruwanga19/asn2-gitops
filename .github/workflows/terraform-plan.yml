name: Terraform plan + IaC scan

on:
  pull_request:
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  iac-scan:
    name: Static analysis (Checkov + tfsec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/terraform
          framework: terraform
          soft_fail: false
          quiet: true

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra/terraform
          soft_fail: false

  plan:
    name: terraform plan
    needs: iac-scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - run: terraform fmt -check -recursive
      - run: terraform init -input=false
      - run: terraform validate
      - name: terraform plan
        id: plan
        run: |
          terraform plan -input=false -no-color -out=tfplan
          echo "summary<<EOF" >> "$GITHUB_OUTPUT"
          terraform show -no-color tfplan | head -c 60000 >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const out = `#### terraform plan\n\n<details><summary>Expand</summary>\n\n\`\`\`\n${{ steps.plan.outputs.summary }}\n\`\`\`\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: out
            })
