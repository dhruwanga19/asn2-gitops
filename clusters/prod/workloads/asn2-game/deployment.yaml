apiVersion: apps/v1
kind: Deployment
metadata:
  name: asn2-game
  namespace: asn2
  labels:
    app.kubernetes.io/name: asn2-game
    app.kubernetes.io/part-of: asn2
spec:
  # Single replica: the x11vnc session is shared; scaling > 1 would give
  # different users different games. Intentional for a portfolio demo.
  replicas: 1
  strategy:
    type: Recreate          # avoid two pods contending for the ALB target
  selector:
    matchLabels:
      app.kubernetes.io/name: asn2-game
  template:
    metadata:
      labels:
        app.kubernetes.io/name: asn2-game
        app.kubernetes.io/part-of: asn2
    spec:
      automountServiceAccountToken: false
      securityContext:
        # supervisord needs root to manage X sockets; the game itself
        # runs as UID 1000 via `gosu app` inside the container.
        runAsUser: 0
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: game
          image: asn2-game # replaced by kustomize `images:` below
          imagePullPolicy: IfNotPresent
          ports:
            - name: novnc
              containerPort: 6080
              protocol: TCP
          env:
            - { name: BOARD_SIZE,       value: "5" }
            - { name: EMPTY_POSITIONS,  value: "3" }
            - { name: DEPTH,            value: "3" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false    # Xvfb writes to /tmp
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits:   { cpu: 1,    memory: 1Gi }
          readinessProbe:
            exec:
              command: ["/usr/local/bin/k8s-probe"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: novnc
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - { name: tmp,  mountPath: /tmp }
            - { name: logs, mountPath: /var/log/supervisor }
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 128Mi
        - name: logs
          emptyDir: {}
      terminationGracePeriodSeconds: 15
